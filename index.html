<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <script>
        function getComputerChoice() {
            random_choice = Math.random()
            console.log(random_choice)

            if (random_choice <= 0.33) {
                return 'rock'
            }

            else if (random_choice > 0.33 && random_choice <= 0.66) {
                return 'paper'
            }

            else if (0.66 < random_choice) {
                return 'scissors'
            }
        }
    </script>
</body>
</html>
